<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Upcoming Movies — XSTREAM</title>
<link rel="stylesheet" href="css/upcoming.css">
</head>
<body>
<div id="upcoming-page">

  <section class="upcoming-hero">
    <h1 class="upcoming-hero-title">🎬 Upcoming Movies</h1>
    <p class="upcoming-hero-sub">Discover the biggest upcoming movies, premieres, and blockbuster releases from this year and the years ahead.</p>
    <div class="upcoming-hero-stats" id="upcoming-stats"></div>
  </section>

  <section class="upcoming-controls">
    <div class="upcoming-search-box">
      <svg class="upcoming-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="upcoming-search" placeholder="Search by title, genre, or year..." aria-label="Search upcoming movies">
    </div>
    <div class="upcoming-filters">
      <select id="upcoming-f-year" aria-label="Filter by release year"><option value="">All Years</option></select>
      <select id="upcoming-f-genre" aria-label="Filter by genre"><option value="">All Genres</option></select>
      <select id="upcoming-f-age" aria-label="Filter by age rating"><option value="">All Ratings</option></select>
      <select id="upcoming-f-rating" aria-label="Filter by IMDb rating"><option value="">All Ratings</option></select>
      <select id="upcoming-f-month" aria-label="Filter by release month"><option value="">All Months</option></select>
      <select id="upcoming-f-status" aria-label="Filter by status"><option value="">All</option></select>
      <button id="upcoming-clear" type="button">Clear Filters</button>
    </div>
  </section>

  <section class="upcoming-grid-section">
    <div class="upcoming-grid" id="upcoming-grid"></div>
    <div class="upcoming-sentinel" id="upcoming-sentinel"></div>
    <div class="upcoming-state" id="upcoming-empty" style="display:none">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
      <h3 id="upcoming-empty-title">No Upcoming Movies Found</h3>
      <p id="upcoming-empty-msg">Please check back later.</p>
    </div>
    <div class="upcoming-state" id="upcoming-error" style="display:none">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#ff4040" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h3>Unable to load upcoming movies.</h3>
      <p id="upcoming-error-text">Please try again later.</p>
      <button id="upcoming-retry-btn" type="button">Retry</button>
    </div>
  </section>

</div>
<script src="js/upcoming.js"></script>
</body>
</html>
