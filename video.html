<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Watch this Movie on Xstream.">
  <title>Watch movie — Xstream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ad.css">

<style>
/* ══════════════════════════════════════════════════════════════
   POSTER OVERLAY — MOBILE DEFAULT: HIDDEN
   This element is new (not in external CSS), so we must
   explicitly hide it below 1024px.
   ══════════════════════════════════════════════════════════════ */
.poster-play-overlay {
  display: none !important;
}
.poster-play-bg,
.poster-play-darken,
.poster-play-btn {
  display: none !important;
}

/* ══════════════════════════════════════════════════════════════
   DESKTOP — 1024px AND ABOVE
   Every selector uses body[data-page="video"] to guarantee
   it beats ANY rule in css/style.css or css/ad.css,
   regardless of their specificity or !important usage.
   ══════════════════════════════════════════════════════════════ */
@media (min-width: 1024px) {

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: #050505; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
  ::selection { background: rgba(229,9,20,0.35); color: #fff; }

  /* ── Body ── */
  body[data-page="video"] {
    background: #050505 !important;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(229,9,20,0.02) 0%, transparent 50%) !important;
  }

  /* ── Main ── */
  body[data-page="video"] .video-page-main {
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    max-width: 100% !important;
  }

  /* ══════════════════════════════════════
     PAGE GRID — single column, stacked
     ══════════════════════════════════════ */
  body[data-page="video"] .video-page-grid {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 0 !important;
    max-width: 1440px !important;
    margin: 0 auto !important;
    padding: 36px 48px 0 !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    overflow: visible !important;
    position: static !important;
  }

  /* ══════════════════════════════════════
     PLAYER COL — internal 2-col grid
     LEFT: poster   RIGHT: info
     ══════════════════════════════════════ */
  body[data-page="video"] .video-player-col {
    display: grid !important;
    grid-template-columns: 1fr 1.2fr !important;
    grid-template-rows: auto auto !important;
    gap: 0 40px !important;
    align-items: start !important;
    padding: 0 !important;
    margin: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    overflow: visible !important;
    position: static !important;
  }

  /* Grid placements */
  body[data-page="video"] .player-poster-container {
    grid-column: 1 !important;
    grid-row: 1 / 3 !important;
  }
  body[data-page="video"] .video-info {
    grid-column: 2 !important;
    grid-row: 1 !important;
  }
  body[data-page="video"] .social-nav-buttons {
    grid-column: 2 !important;
    grid-row: 2 !important;
    margin-top: 24px !important;
  }
  body[data-page="video"] #video-not-found {
    grid-column: 1 / -1 !important;
    grid-row: 1 !important;
  }

  /* ══════════════════════════════════════
     POSTER / PLAYER CARD — left column
     ══════════════════════════════════════ */
  body[data-page="video"] .player-poster-container {
    position: relative !important;
    height: 540px !important;
    border-radius: 16px !important;
    overflow: hidden !important;
    background: #0a0a0a !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    box-shadow:
      0 20px 70px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.03) inset !important;
    align-self: start !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    overflow: hidden !important;
    position: relative !important;
  }

  body[data-page="video"] .video-player-wrapper {
    position: relative !important;
    width: 100% !important;
    height: 100% !important;
    background: #000 !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    overflow: hidden !important;
  }
  body[data-page="video"] .video-player-wrapper video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    display: block !important;
    background: #000 !important;
    border-radius: 0 !important;
  }
  body[data-page="video"] .skeleton-player {
    width: 100% !important;
    height: 100% !important;
    border-radius: 0 !important;
  }

  /* ══════════════════════════════════════
     POSTER PLAY OVERLAY — desktop only
     ══════════════════════════════════════ */
  body[data-page="video"] .poster-play-overlay {
    display: none !important;
    position: absolute !important;
    inset: 0 !important;
    z-index: 10 !important;
    align-items: center !important;
    justify-content: center !important;
    cursor: pointer !important;
    transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out !important;
    border-radius: 0 !important;
    background: none !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden !important;
  }
  body[data-page="video"] .poster-play-overlay.poster-fade-out {
    opacity: 0 !important;
    transform: scale(1.04) !important;
    pointer-events: none !important;
  }
  body[data-page="video"] .poster-play-bg {
    display: block !important;
    position: absolute !important;
    inset: 0 !important;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    transition: transform 0.5s ease !important;
  }
  body[data-page="video"] .poster-play-overlay:hover .poster-play-bg {
    transform: scale(1.04);
  }
  body[data-page="video"] .poster-play-darken {
    display: block !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.7) 0%,
      rgba(0,0,0,0.3) 40%,
      rgba(0,0,0,0.15) 100%
    ) !important;
    z-index: 1 !important;
  }
  body[data-page="video"] .poster-play-btn {
    display: flex !important;
    position: relative !important;
    z-index: 2 !important;
    width: 80px !important;
    height: 80px !important;
    border-radius: 50% !important;
    background: rgba(229,9,20,0.2) !important;
    backdrop-filter: blur(24px) !important;
    -webkit-backdrop-filter: blur(24px) !important;
    border: 2px solid rgba(229,9,20,0.4) !important;
    align-items: center !important;
    justify-content: center !important;
    cursor: pointer !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow:
      0 0 40px rgba(229,9,20,0.3),
      0 0 80px rgba(229,9,20,0.1) !important;
    animation: playPulse 2.8s ease-in-out infinite !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease !important;
    outline: none !important;
    color: transparent !important;
    font-size: 0 !important;
    line-height: 0 !important;
  }
  body[data-page="video"] .poster-play-btn:hover {
    transform: scale(1.15) !important;
    background: rgba(229,9,20,0.35) !important;
    box-shadow:
      0 0 60px rgba(229,9,20,0.5),
      0 0 120px rgba(229,9,20,0.15) !important;
    animation: none !important;
  }
  body[data-page="video"] .poster-play-btn svg {
    width: 32px !important;
    height: 32px !important;
    margin-left: 4px !important;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }
  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(229,9,20,0.3), 0 0 80px rgba(229,9,20,0.1); }
    50% { box-shadow: 0 0 55px rgba(229,9,20,0.45), 0 0 100px rgba(229,9,20,0.15); }
  }

  /* ══════════════════════════════════════
     VIDEO INFO — right column
     ══════════════════════════════════════ */
  body[data-page="video"] .video-info {
    display: block !important;
    padding: 8px 0 0 !important;
    margin: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    overflow: visible !important;
    position: static !important;
  }
  body[data-page="video"] .video-title {
    font-family: 'Poppins', sans-serif !important;
    font-size: 36px !important;
    font-weight: 800 !important;
    color: #ffffff !important;
    line-height: 1.12 !important;
    letter-spacing: -0.4px !important;
    margin: 0 0 18px 0 !important;
    padding: 0 !important;
  }
  body[data-page="video"] .video-meta {
    display: flex !important;
    flex-direction: column !important;
    gap: 18px !important;
    margin: 0 !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    overflow: visible !important;
  }

  /* Stat badges */
  body[data-page="video"] .video-stats {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: wrap !important;
    gap: 8px !important;
    align-items: center !important;
    padding: 0 !important;
    margin: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    overflow: visible !important;
  }
  body[data-page="video"] .video-stats .stat-item {
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
    padding: 5px 12px !important;
    background: rgba(255,255,255,0.06) !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 8px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 12.5px !important;
    font-weight: 500 !important;
    color: #aaa !important;
    white-space: nowrap !important;
    margin: 0 !important;
    transition: background 0.2s, color 0.2s !important;
    cursor: default !important;
    float: none !important;
  }
  body[data-page="video"] .video-stats .stat-item:hover {
    background: rgba(255,255,255,0.1) !important;
    color: #ddd !important;
  }
  body[data-page="video"] .video-stats .stat-item svg {
    width: 14px !important;
    height: 14px !important;
    opacity: 0.6 !important;
    flex-shrink: 0 !important;
  }
  body[data-page="video"] .video-stats .stat-item span {
    font-size: 12.5px !important;
  }

  /* Action buttons */
  body[data-page="video"] .video-actions {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: wrap !important;
    gap: 8px !important;
    padding: 0 !important;
    margin: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    overflow: visible !important;
  }
  body[data-page="video"] .video-actions .action-btn {
    display: inline-flex !important;
    align-items: center !important;
    gap: 7px !important;
    padding: 9px 18px !important;
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid rgba(255,255,255,0.07) !important;
    border-radius: 10px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    color: #bbb !important;
    cursor: pointer !important;
    transition: all 0.25s ease !important;
    outline: none !important;
    margin: 0 !important;
    white-space: nowrap !important;
    float: none !important;
  }
  body[data-page="video"] .video-actions .action-btn svg {
    width: 16px !important;
    height: 16px !important;
    flex-shrink: 0 !important;
  }
  body[data-page="video"] .video-actions .action-btn:hover {
    background: rgba(255,255,255,0.1) !important;
    border-color: rgba(255,255,255,0.12) !important;
    color: #fff !important;
    transform: translateY(-1px) !important;
  }
  body[data-page="video"] .video-actions .action-btn:active {
    transform: translateY(0) !important;
  }
  body[data-page="video"] .video-actions .action-btn.active,
  body[data-page="video"] .video-actions .action-btn.liked {
    background: rgba(229,9,20,0.15) !important;
    border-color: rgba(229,9,20,0.3) !important;
    color: #E50914 !important;
  }
  body[data-page="video"] .video-actions .action-btn.active svg,
  body[data-page="video"] .video-actions .action-btn.liked svg {
    color: #E50914 !important;
  }

  /* Description */
  body[data-page="video"] .video-description-box {
    display: block !important;
    margin-top: 4px !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    overflow: visible !important;
  }
  body[data-page="video"] .video-description-box p {
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    font-weight: 400 !important;
    color: #888 !important;
    line-height: 1.75 !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ══════════════════════════════════════
     SOCIAL NAV BUTTONS
     ══════════════════════════════════════ */
  body[data-page="video"] .social-nav-buttons {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: wrap !important;
    gap: 10px !important;
    padding: 0 !important;
    margin: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    overflow: visible !important;
    position: static !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn {
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    padding: 10px 20px !important;
    border-radius: 10px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    color: #fff !important;
    text-decoration: none !important;
    transition: all 0.25s ease !important;
    border: none !important;
    margin: 0 !important;
    cursor: pointer !important;
    float: none !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn svg {
    width: 18px !important;
    height: 18px !important;
    flex-shrink: 0 !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--telegram {
    background: rgba(0,136,204,0.15) !important;
    border: 1px solid rgba(0,136,204,0.25) !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--telegram:hover {
    background: rgba(0,136,204,0.3) !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 24px rgba(0,136,204,0.2) !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--whatsapp {
    background: rgba(37,211,102,0.12) !important;
    border: 1px solid rgba(37,211,102,0.2) !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--whatsapp:hover {
    background: rgba(37,211,102,0.25) !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 24px rgba(37,211,102,0.15) !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--youtube {
    background: rgba(255,0,0,0.12) !important;
    border: 1px solid rgba(255,0,0,0.2) !important;
  }
  body[data-page="video"] .social-nav-buttons .social-nav-btn--youtube:hover {
    background: rgba(255,0,0,0.25) !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 24px rgba(255,0,0,0.15) !important;
  }

  /* ══════════════════════════════════════
     RELATED VIDEOS — full width horizontal
     ══════════════════════════════════════ */
  body[data-page="video"] .related-sidebar {
    display: block !important;
    grid-column: 1 / -1 !important;
    margin-top: 48px !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: visible !important;
    max-height: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    position: static !important;
  }
  body[data-page="video"] .related-title {
    font-family: 'Poppins', sans-serif !important;
    font-size: 22px !important;
    font-weight: 700 !important;
    color: #ffffff !important;
    padding: 0 0 18px !important;
    margin: 0 !important;
    border-bottom: none !important;
    letter-spacing: -0.3px !important;
    background: transparent !important;
  }

  /* Horizontal scroll */
  body[data-page="video"] .related-list,
  body[data-page="video"] .widget-video-list {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    gap: 18px !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    padding: 0 0 12px !important;
    margin: 0 !important;
    list-style: none !important;
    scroll-snap-type: x mandatory !important;
    -webkit-overflow-scrolling: touch !important;
    scrollbar-width: none !important;
    float: none !important;
    clear: both !important;
    width: auto !important;
    min-width: 0 !important;
    max-width: none !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    position: static !important;
  }
  body[data-page="video"] .related-list::-webkit-scrollbar,
  body[data-page="video"] .widget-video-list::-webkit-scrollbar {
    display: none !important;
  }

  /* Each related card — vertical poster layout */
  body[data-page="video"] .related-list .widget-video-item,
  body[data-page="video"] .related-list a,
  body[data-page="video"] .related-list > div,
  body[data-page="video"] .widget-video-list .widget-video-item,
  body[data-page="video"] .widget-video-list a,
  body[data-page="video"] .widget-video-list > div {
    display: flex !important;
    flex-direction: column !important;
    min-width: 185px !important;
    max-width: 185px !important;
    padding: 0 !important;
    margin: 0 !important;
    text-decoration: none !important;
    color: inherit !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
    cursor: pointer !important;
    border: none !important;
    border-radius: 12px !important;
    background: #141414 !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25) !important;
    overflow: hidden !important;
    scroll-snap-align: start !important;
    float: none !important;
    clear: both !important;
    position: static !important;
  }
  body[data-page="video"] .related-list .widget-video-item:hover,
  body[data-page="video"] .related-list a:hover,
  body[data-page="video"] .related-list > div:hover,
  body[data-page="video"] .widget-video-list .widget-video-item:hover,
  body[data-page="video"] .widget-video-list a:hover,
  body[data-page="video"] .widget-video-list > div:hover {
    transform: translateY(-6px) !important;
    box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 30px rgba(229,9,20,0.06) !important;
    background: #1a1a1a !important;
  }

  /* Thumbnail */
  body[data-page="video"] .related-list .widget-video-item img,
  body[data-page="video"] .related-list a img,
  body[data-page="video"] .widget-video-list .widget-video-item img,
  body[data-page="video"] .widget-video-list a img {
    width: 100% !important;
    min-width: 100% !important;
    height: auto !important;
    aspect-ratio: 2/3 !important;
    object-fit: cover !important;
    border-radius: 0 !important;
    background: #0d0d0d !important;
    flex-shrink: 0 !important;
    display: block !important;
    transition: transform 0.35s ease, filter 0.35s ease !important;
  }
  body[data-page="video"] .related-list .widget-video-item:hover img,
  body[data-page="video"] .related-list a:hover img,
  body[data-page="video"] .widget-video-list .widget-video-item:hover img,
  body[data-page="video"] .widget-video-list a:hover img {
    transform: scale(1.05) !important;
    filter: brightness(1.1) !important;
  }

  /* Info below thumbnail */
  body[data-page="video"] .related-list .widget-info,
  body[data-page="video"] .widget-video-list .widget-info {
    display: flex !important;
    flex-direction: column !important;
    gap: 4px !important;
    padding: 12px !important;
    min-width: 0 !important;
    margin: 0 !important;
  }
  body[data-page="video"] .related-list .widget-title,
  body[data-page="video"] .widget-video-list .widget-title,
  body[data-page="video"] .related-list .widget-video-item .title,
  body[data-page="video"] .widget-video-list .widget-video-item .title {
    font-family: 'Poppins', sans-serif !important;
    font-size: 12.5px !important;
    font-weight: 600 !important;
    color: #e0e0e0 !important;
    line-height: 1.35 !important;
    display: -webkit-box !important;
    -webkit-line-clamp: 2 !important;
    -webkit-box-orient: vertical !important;
    overflow: hidden !important;
    margin: 0 !important;
    padding: 0 !important;
    text-decoration: none !important;

  <script>
  (function() {
    'use strict';

    var overlay  = document.getElementById('poster-play-overlay');
    var playBtn  = document.getElementById('poster-play-btn');
    var posterBg = document.getElementById('poster-play-bg');
    var wrapper  = document.getElementById('video-player-wrapper');

    if (!overlay || !playBtn || !wrapper) return;

    /* Only activate on desktop */
    function isDesktop() { return window.innerWidth >= 1024; }
    if (!isDesktop()) return;

    window.addEventListener('resize', function() {
      if (!isDesktop() && overlay.style.display === 'flex') {
        overlay.style.display = 'none';
      }
    });

    var videoReady = false;

    function setupOverlay(video) {
      if (videoReady) return;
      videoReady = true;

      /* Get poster image from multiple sources */
      var posterUrl = video.poster || '';
      if (!posterUrl) {
        var img = wrapper.querySelector('img');
        if (img && img.src) posterUrl = img.src;
      }
      if (!posterUrl) {
        var col = document.querySelector('.video-player-col');
        if (col) {
          var ci = col.querySelector('img');
          if (ci && ci.src) posterUrl = ci.src;
        }
      }
      if (!posterUrl) {
        var og = document.querySelector('meta[property="og:image"]');
        if (og && og.content) posterUrl = og.content;
      }
      if (posterUrl) {
        posterBg.style.backgroundImage = 'url(' + posterUrl + ')';
      }

      /* Prevent preloading video until play */
      video.preload = 'none';
      video.removeAttribute('autoplay');
      video.pause();

      /* Show overlay */
      overlay.style.display = 'flex';

      /* Play button click */
      playBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();

        /* Enable loading */
        video.preload = 'auto';

        /* Fade out overlay */
        overlay.classList.add('poster-fade-out');

        /* Start playback */
        video.play().catch(function(err) {
          console.warn('[PlayOverlay] Play failed:', err);
        });

        /* Remove overlay after animation */
        setTimeout(function() {
          overlay.style.display = 'none';
          overlay.classList.remove('poster-fade-out');
        }, 350);
      });
    }

    /* Observe for video element insertion by app.js */
    var observer = new MutationObserver(function() {
      var video = wrapper.querySelector('video');
      if (video) {
        observer.disconnect();
        setTimeout(function() { setupOverlay(video); }, 200);
      }
    });
    observer.observe(wrapper, { childList: true, subtree: true });

    /* Also check if video already exists */
    var existing = wrapper.querySelector('video');
    if (existing) {
      observer.disconnect();
      setTimeout(function() { setupOverlay(existing); }, 200);
    }

  })();
  </script>
